# Fly.io config for LuxGen API
# Usage: fly launch --config deploy/platforms/fly.api.toml --no-deploy
#        fly secrets set MONGODB_URI=... JWT_SECRET=...
#        fly deploy --config deploy/platforms/fly.api.toml

app = "luxgen-api"
primary_region = "iad"

[build]
  dockerfile = "apps/api/Dockerfile"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
