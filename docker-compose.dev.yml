# ─────────────────────────────────────────────────────────────────────────────
# LuxGen Development Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#        OR simply: make dev-full
#
# This file OVERRIDES services in docker-compose.yml for development:
#   - Adds hot-reload volumes for api and web
#   - Enables debug ports
#   - Adds dev-only admin UIs (mongo-express, redis-commander)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── API — dev override (hot reload via ts-node-dev) ───────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    environment:
      NODE_ENV: development
      DEBUG: "luxgen:*"
      LOG_LEVEL: debug
      PORT: 4000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/luxgen_dev?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      CORS_ORIGIN: http://localhost:3000
      APOLLO_INTROSPECTION: "true"
    volumes:
      - .:/app                    # full monorepo mounted for hot reload
      - /app/node_modules         # anonymous volume — prevents host override
      - /app/apps/api/node_modules
    command: ["sh", "-c", "npm install && npm run dev:api"]
    ports:
      - "4000:4000"
      - "9229:9229"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Web — dev override (Next.js hot reload) ───────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_ENV: development
      API_URL: http://api:4000
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:latest}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/.next
      - /app/apps/web/node_modules
    command: ["sh", "-c", "npm install && npm run dev:web"]
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ── Mongo Express (dev only) ───────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.0
    container_name: luxgen-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      mongodb:
        condition: service_healthy

  # ── Redis Commander (dev only) ─────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: luxgen-redis-commander
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
