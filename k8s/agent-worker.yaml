apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-worker
  namespace: luxgen
  labels:
    app: agent-worker
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-worker
  template:
    metadata:
      labels:
        app: agent-worker
        component: worker
    spec:
      containers:
        - name: agent-worker
          image: luxgen/agent-worker:latest
          envFrom:
            - configMapRef:
                name: luxgen-config
            - secretRef:
                name: luxgen-secrets
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: luxgen-secrets
                  key: MONGODB_URI
            - name: OLLAMA_HOST
              valueFrom:
                configMapKeyRef:
                  name: luxgen-config
                  key: OLLAMA_HOST
          resources:
            requests:
              memory: '512Mi'
              cpu: '250m'
            limits:
              memory: '2Gi'
              cpu: '1000m'
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://localhost:4000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://localhost:4000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: agent-worker-service
  namespace: luxgen
  labels:
    app: agent-worker
    component: worker
spec:
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
      name: http
  selector:
    app: agent-worker
